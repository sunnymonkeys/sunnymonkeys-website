<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-style-mode" content="1">
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/fav.png">
    <title>Client Login — Sunny Monkeys LLC</title>
    <meta http-equiv="refresh" content="0; url=portal/login.php">
    <link rel="stylesheet" href="assets/css/plugins/fontawesome-6.css">
    <link rel="stylesheet" href="assets/css/plugins/swiper.min.css">
    <link rel="stylesheet" href="assets/css/vendor/metismenu.css">
    <link rel="stylesheet" href="assets/css/plugins/animate.min.css">
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
    /* ── Login button ── */
    .sm-login-btn {
        display: inline-flex; align-items: center; overflow: hidden; position: relative;
        border: 2px solid #fff !important; background: #fff !important; color: #111 !important;
        padding: 10px 28px !important; border-radius: 6px !important;
        font-size: 1.25rem !important; font-weight: 700 !important;
        text-decoration: none !important; letter-spacing: 0.04em !important;
        transition: background 0.25s, color 0.25s, border-color 0.25s !important;
        white-space: nowrap !important;
    }
    .sm-login-btn .btn-text { display: inline-block; transition: transform 0.3s cubic-bezier(.23,1,.32,1), opacity 0.3s; }
    .sm-login-btn .btn-text-hover { position: absolute; left: 50%; transform: translateX(-50%) translateY(100%); opacity: 0; transition: transform 0.3s cubic-bezier(.23,1,.32,1), opacity 0.3s; font-weight: 700; white-space: nowrap; }
    .sm-login-btn:hover .btn-text { transform: translateY(-130%); opacity: 0; }
    .sm-login-btn:hover .btn-text-hover { transform: translateX(-50%) translateY(-50%); opacity: 1; }
    .sm-login-btn:hover { background: #111 !important; color: #fff !important; border-color: #111 !important; }
    
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .login-logo { text-align: center; margin-bottom: 40px; }
    .login-logo img { height: 56px; width: auto; }
    .login-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 48px 40px; }
    @media (max-width: 480px) { .login-card { padding: 36px 24px; } }
    .login-card h2 { font-size: 2.4rem; font-weight: 800; color: #fff; margin-bottom: 8px; letter-spacing: -0.03em; }
    .login-card p { font-size: 1.1rem; color: #666; margin-bottom: 36px; }
    .lf-group { margin-bottom: 20px; }
    .lf-group label { display: block; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #666; margin-bottom: 8px; }
    .lf-group input { width: 100%; background: #111; border: 1.5px solid #2e2e2e; border-radius: 8px; padding: 16px 18px; font-size: 1.1rem; color: #fff; outline: none; transition: border-color 0.2s; }
    .lf-group input:focus { border-color: #555; }
    .lf-group input::placeholder { color: #444; }
    .login-btn-main { width: 100%; background: #fff; color: #111; border: none; border-radius: 8px; padding: 17px; font-size: 1.15rem; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 8px; }
    .login-btn-main:hover { background: #e8e8e8; transform: translateY(-1px); }
    .login-footer { text-align: center; margin-top: 28px; font-size: 1rem; color: #444; }
    .login-footer a { color: #777; text-decoration: none; }
    .login-footer a:hover { color: #fff; }
    .login-back { text-align: center; margin-top: 32px; }
    .login-back a { color: #444; font-size: 1rem; text-decoration: none; transition: color 0.2s; }
    .login-back a:hover { color: #fff; }
    .coming-soon-note { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 18px; margin-bottom: 28px; font-size: 1rem; color: #555; text-align: center; line-height: 1.5; }

    </style>
</head>
<body>

    <div class="login-wrap">
        <div class="login-logo">
            <a href="index.html"><img src="assets/images/logo-sunny-monkeys-white.png" alt="Sunny Monkeys" style="width:44px;height:44px;object-fit:contain;display:block;border-radius:50%;"></a>
        </div>
        <div class="login-card">
            <h2>Client Portal</h2>
            <p>Sign in to access your project dashboard.</p>
            <div class="coming-soon-note">
                🔒 &nbsp;Client portal coming soon. <br>Reach out to <a href="mailto:contact@sunnymonkeys.com" style="color:#666;">contact@sunnymonkeys.com</a> for project updates.
            </div>
            <form action="#" id="login-form">
                <div class="lf-group">
                    <label for="lf-email">Email Address</label>
                    <input type="email" id="lf-email" placeholder="you@company.com" disabled>
                </div>
                <div class="lf-group">
                    <label for="lf-pass">Password</label>
                    <input type="password" id="lf-pass" placeholder="••••••••" disabled>
                </div>
                <button type="button" class="login-btn-main" disabled style="opacity:0.4;cursor:not-allowed;">Sign In</button>
            </form>
            <div class="login-footer">
                <a href="contact.html">Need access? Contact us →</a>
            </div>
        </div>
        <div class="login-back">
            <a href="index.html">← Back to Sunny Monkeys</a>
        </div>
    </div>

</body>
</html>

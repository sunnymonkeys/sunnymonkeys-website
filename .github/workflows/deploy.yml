name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code on server
        run: |
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -H "Authorization: cpanel marcome2:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://sunnymonkeys.com:2083/execute/VersionControl/retrieve?repository=/home1/marcome2/repositories/sunnymonkeys-website"

      - name: Deploy to public_html
        run: |
          curl -s -w "\nHTTP Status: %{http_code}\n" \
            -H "Authorization: cpanel marcome2:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://sunnymonkeys.com:2083/execute/VersionControlDeployment/create?repository=/home1/marcome2/repositories/sunnymonkeys-website"

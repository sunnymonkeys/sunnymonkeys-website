    <style>
    /* ── Login button ── */
    .sm-login-btn {
        display: inline-flex; align-items: center; overflow: hidden; position: relative;
        border: 2px solid #fff !important; background: #fff !important; color: #111 !important;
        padding: 10px 28px !important; border-radius: 6px !important;
        font-size: 1.25rem !important; font-weight: 700 !important;
        text-decoration: none !important; letter-spacing: 0.04em !important;
        transition: background 0.25s, color 0.25s, border-color 0.25s !important;
        white-space: nowrap !important;
    }
    .sm-login-btn .btn-text { display: inline-block; transition: transform 0.3s cubic-bezier(.23,1,.32,1), opacity 0.3s; }
    .sm-login-btn .btn-text-hover { position: absolute; left: 50%; transform: translateX(-50%) translateY(100%); opacity: 0; transition: transform 0.3s cubic-bezier(.23,1,.32,1), opacity 0.3s; font-weight: 700; white-space: nowrap; }
    .sm-login-btn:hover .btn-text { transform: translateY(-130%); opacity: 0; }
    .sm-login-btn:hover .btn-text-hover { transform: translateX(-50%) translateY(-50%); opacity: 1; }
    .sm-login-btn:hover { background: #111 !important; color: #fff !important; border-color: #111 !important; }
    
    .under-construction {
        min-height: 100vh; display: flex; flex-direction: column;

    .uc-logo { margin-bottom: 48px; }

    .uc-eyebrow { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #666; margin-bottom: 24px; }
    .uc-title { font-size: clamp(2.5rem, 7vw, 5rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; margin-bottom: 24px; }
    .uc-title span { color: #555; }
    .uc-sub { font-size: 1.1rem; color: #888; max-width: 480px; line-height: 1.7; margin-bottom: 48px; }
    .uc-btn { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #111; padding: 14px 32px; border-radius: 8px; font-size: 0.95rem; font-weight: 700; text-decoration: none; letter-spacing: 0.04em; transition: opacity 0.2s; }
    .uc-btn:hover { opacity: 0.85; color: #111; }
    .uc-footer { margin-top: 80px; font-size: 0.78rem; color: #444; }
    .uc-footer a { color: #666; text-decoration: none; }
